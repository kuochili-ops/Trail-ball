<div id="share-panel" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; background: #222; border: 2px solid #28a745; border-radius: 20px; padding: 25px; color: white; text-align: center; z-index: 1000; box-shadow: 0 0 30px rgba(0,0,0,1);">
    <h2 style="color: #28a745; margin-top: 0;">🏆 挑戰完成！</h2>
    <p style="font-size: 18px;">您的成績：<span id="final-result" style="font-weight: bold; color: #f1c40f;">0.00</span> 秒</p>
    <p style="font-size: 14px; color: #aaa;">您可以將此賽道發送給好友，<br>邀請他們挑戰您的紀錄！</p>
    <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 20px;">
        <button onclick="shareToLine()" style="background: #06c755; color: white; padding: 12px; border: none; border-radius: 10px; font-weight: bold;">💬 發送 LINE 挑戰戰帖</button>
        <button onclick="closeShare()" style="background: transparent; color: #888; border: none; text-decoration: underline;">回首頁</button>
    </div>
</div>

<script>
    // 1. 初始化時需要載入 LIFF SDK (請在 <head> 加入 SDK script)
    // <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"><\/script>

    let currentMapData = "";
    let currentRecord = "";

    async function handleWin() {
        mode = 'GOAL';
        currentRecord = ((Date.now() - startTime)/1000).toFixed(2);
        currentMapData = encodePath(); // 將路徑轉成 Base64
        
        // 顯示分享視窗
        document.getElementById('final-result').innerText = currentRecord;
        document.getElementById('share-panel').style.display = 'block';
        
        // 繪圖區域暫停
        window.removeEventListener('deviceorientation', handleMotion);
    }

    function closeShare() {
        document.getElementById('share-panel').style.display = 'none';
        clearPath();
    }

    async function shareToLine() {
        // 生成挑戰連結
        const shareLink = `${window.location.origin}${window.location.pathname}?map=${currentMapData}&time=${currentRecord}`;
        
        // 如果是在 LIFF 環境中
        if (typeof liff !== 'undefined' && liff.isLoggedIn()) {
            try {
                const result = await liff.shareTargetPicker([
                    {
                        "type": "flex",
                        "altText": "有人向你發起了平衡球挑戰！",
                        "contents": {
                          "type": "bubble",
                          "body": {
                            "type": "box",
                            "layout": "vertical",
                            "contents": [
                              {"type": "text", "text": "⚖️ 平衡球大師挑戰", "weight": "bold", "size": "xl", "color": "#28a745"},
                              {"type": "text", "text": `我的紀錄：${currentRecord} 秒`, "size": "md", "margin": "md"},
                              {"type": "text", "text": "這是我親手畫的路徑，你能贏過我嗎？", "size": "sm", "color": "#888888", "wrap": true, "margin": "sm"}
                            ]
                          },
                          "footer": {
                            "type": "box",
                            "layout": "vertical",
                            "contents": [
                              {
                                "type": "button",
                                "action": {
                                  "type": "uri",
                                  "label": "接受挑戰",
                                  "uri": shareLink
                                },
                                "style": "primary",
                                "color": "#28a745"
                              }
                            ]
                          }
                        }
                    }
                ]);
                if (result) {
                    alert("戰帖已發送！");
                    closeShare();
                }
            } catch (error) {
                console.error("分享失敗", error);
                // 備援方案：直接複製連結
                copyToClipboard(shareLink);
            }
        } else {
            // 非 LIFF 環境下，提供複製連結
            copyToClipboard(shareLink);
            alert("非 LINE 環境，已為您複製挑戰連結！");
        }
    }

    function copyToClipboard(text) {
        const dummy = document.createElement("textarea");
        document.body.appendChild(dummy);
        dummy.value = text;
        dummy.select();
        document.execCommand("copy");
        document.body.removeChild(dummy);
    }
</script>
