<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LINE 平衡球大師</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --line-green: #06c755; }
        body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#121212; position:fixed; }
        
        /* 核心修正：將按鈕容器完全獨立 */
        #controls-layer { 
            position: fixed; bottom: 40px; left: 0; width: 100%; 
            display: flex; flex-direction: column; align-items: center; gap: 15px; 
            z-index: 9999 !important; /* 最高優先權 */
            pointer-events: none; /* 容器本身不擋住觸摸 */
        }
        .interactive { pointer-events: auto !important; } /* 只有按鈕跟選單可以點 */

        #ui-overlay { position: fixed; top: 60px; left: 20px; color: white; pointer-events: none; z-index: 10; }
        #timer { font-size: 32px; font-weight: bold; color: #f1c40f; }

        button { 
            padding: 15px 35px; font-size: 18px; border-radius: 40px; border: none; color: white; font-weight: bold; 
            background: var(--line-green); box-shadow: 0 4px 15px rgba(0,0,0,0.6); cursor: pointer;
        }
        button:active { transform: scale(0.95); opacity: 0.9; }
        button:disabled { background: #555; opacity: 0.5; }
        
        .btn-alt { background: #4a4a4a; padding: 12px 25px; font-size: 14px; }
        select { padding: 12px; border-radius: 15px; font-size: 16px; margin-bottom: 5px; }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; touch-action: none; }

        #share-panel { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 80%; background: #1a1a1a; border: 2px solid var(--line-green); border-radius: 25px; 
            padding: 25px; color: white; text-align: center; z-index: 10000; 
        }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div id="status">⏳ 系統初始化中...</div>
    <div id="timer">0.00s</div>
</div>

<div id="controls-layer">
    <select id="ballType" class="interactive">
        <option value="volleyball">🏐 排球</option>
        <option value="basketball">🏀 籃球</option>
        <option value="soccer">⚽ 足球</option>
        <option value="nineball">🎱 九號球</option>
    </select>
    <div style="display:flex; gap:10px;" class="interactive">
        <button class="btn-alt" onclick="clearPath()">清空重畫</button>
        <button id="startBtn" onclick="handleStartClick()">確認開始</button>
    </div>
</div>

<div id="share-panel">
    <h2 style="color:var(--line-green);">🏆 抵達終點！</h2>
    <p>秒數：<span id="final-time">0.00</span>s</p>
    <button onclick="sendChallenge()" style="width:100%; margin-bottom:10px;">💬 發送戰帖</button>
    <button class="btn-alt" onclick="closeShare()" style="width:100%;">重新挑戰</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const LIFF_ID = "2009222789-78cVEvXM";
    const LIFF_URL = "https://liff.line.me/2009222789-78cVEvXM";
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    
    let mode = 'DRAW', path = [], ball = { x: 0, y: 0, vx: 0, vy: 0, radius: 18, rotation: 0, dist: 0 };
    let camera = { x: 0, y: 0, scale: 0.6 }, baseBeta = 0, baseGamma = 0, startTime;
    let isLiffReady = false;

    // 初始化
    liff.init({ liffId: LIFF_ID }).then(() => {
        isLiffReady = true;
        document.getElementById('status').innerText = "🎨 請繪製賽道";
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.get('map')) {
            decodePath(urlParams.get('map'));
            document.getElementById('status').innerText = "🏁 挑戰賽道已載入";
        }
        draw();
    }).catch(err => { document.getElementById('status').innerText = "LIFF 初始化失敗"; });

    // 強制點擊處理
    function handleStartClick() {
        console.log("Button Clicked!"); // 測試有沒有點到
        if (!isLiffReady) return;
        if (path.length < 5) { alert("請先在畫面上畫出路徑喔！"); return; }
        
        // 請求權限
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(res => {
                if (res === 'granted') startCalibration();
                else alert("需要權限才能玩！");
            }).catch(() => startCalibration());
        } else {
            startCalibration();
        }
    }

    function startCalibration() {
        document.getElementById('status').innerText = "⏳ 請平放手機...";
        document.getElementById('controls-layer').style.display = 'none';
        
        setTimeout(() => {
            const capture = (e) => {
                if (e.beta !== null) {
                    baseBeta = e.beta; baseGamma = e.gamma;
                    window.removeEventListener('deviceorientation', capture);
                    mode = 'PLAY'; camera.scale = 1.2;
                    ball.x = path[0].x; ball.y = path[0].y;
                    startTime = Date.now();
                    window.addEventListener('deviceorientation', handleMotion);
                    animate();
                }
            };
            window.addEventListener('deviceorientation', capture);
        }, 500);
    }

    function handleMotion(e) {
        ball.vx += (e.gamma - baseGamma) * 0.05;
        ball.vy += (e.beta - baseBeta) * 0.05;
    }

    function animate() {
        if (mode !== 'PLAY') return;
        ball.vx *= 0.97; ball.vy *= 0.97;
        ball.x += ball.vx; ball.y += ball.vy;
        
        // 跟隨球體移動
        camera.x = ball.x; camera.y = ball.y;

        // 旋轉與滾動距離計算
        if (Math.hypot(ball.vx, ball.vy) > 0.1) {
            ball.rotation = Math.atan2(ball.vy, ball.vx);
            ball.dist += Math.hypot(ball.vx, ball.vy);
        }

        // 碰撞判定
        let onPath = false;
        for (let i = 0; i < path.length - 1; i++) {
            const l2 = (path[i].x - path[i+1].x)**2 + (path[i].y - path[i+1].y)**2;
            let t = ((ball.x - path[i].x) * (path[i+1].x - path[i].x) + (ball.y - path[i].y) * (path[i+1].y - path[i].y)) / l2;
            t = Math.max(0, Math.min(1, t));
            const d = Math.hypot(ball.x - (path[i].x + t * (path[i+1].x - path[i].x)), ball.y - (path[i].y + t * (path[i+1].y - path[i].y)));
            if (d < 26) { onPath = true; break; }
        }
        if (!onPath) { ball.x = path[0].x; ball.y = path[0].y; ball.vx = 0; ball.vy = 0; }
        
        if (Math.hypot(ball.x - path[path.length-1].x, ball.y - path[path.length-1].y) < 25) {
            handleWin(); return;
        }

        draw();
        document.getElementById('timer').innerText = ((Date.now() - startTime)/1000).toFixed(2) + "s";
        requestAnimationFrame(animate);
    }

    function handleWin() {
        mode = 'GOAL';
        document.getElementById('final-time').innerText = ((Date.now() - startTime)/1000).toFixed(2);
        document.getElementById('share-panel').style.display = 'block';
    }

    // 繪圖與鏡頭轉換
    function draw() {
        ctx.setTransform(1,0,0,1,0,0);
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.scale(camera.scale, camera.scale);
        ctx.translate(-camera.x, -camera.y);

        if (path.length > 0) {
            ctx.strokeStyle = "#333"; ctx.lineWidth = 45; ctx.lineCap = "round"; ctx.lineJoin = "round";
            ctx.beginPath(); ctx.moveTo(path[0].x, path[0].y);
            path.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();
            
            // 起點終點
            ctx.fillStyle="#06c755"; ctx.beginPath(); ctx.arc(path[0].x, path[0].y, 15, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle="#dc3545"; ctx.beginPath(); ctx.arc(path[path.length-1].x, path[path.length-1].y, 22, 0, Math.PI*2); ctx.fill();
        }

        const p = (mode === 'PLAY') ? ball : (path.length > 0 ? path[path.length-1] : null);
        if(p) drawBall(p.x, p.y, document.getElementById('ballType').value);
    }

    function drawBall(x, y, type) {
        ctx.save(); ctx.translate(x, y); ctx.beginPath(); ctx.arc(0, 0, ball.radius, 0, Math.PI*2); ctx.clip(); ctx.rotate(ball.rotation);
        const d = ball.dist; const r = ball.radius;
        ctx.fillStyle = (type==='basketball')?'#e67e22':(type==='soccer'?'#fff':(type==='volleyball'?'#fff':'#f1c40f'));
        ctx.fill();
        ctx.strokeStyle = "rgba(0,0,0,0.2)"; ctx.lineWidth = 2; ctx.stroke();
        ctx.restore();
    }

    // 觸摸繪圖座標修正
    canvas.addEventListener('touchstart', (e) => {
        if (mode !== 'DRAW') return;
        const rect = canvas.getBoundingClientRect();
        const t = e.touches[0];
        path = [{ 
            x: (t.clientX - rect.left - canvas.width/2) / camera.scale + camera.x, 
            y: (t.clientY - rect.top - canvas.height/2) / camera.scale + camera.y 
        }];
    });

    canvas.addEventListener('touchmove', (e) => {
        if (mode !== 'DRAW') return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const t = e.touches[0];
        path.push({ 
            x: (t.clientX - rect.left - canvas.width/2) / camera.scale + camera.x, 
            y: (t.clientY - rect.top - canvas.height/2) / camera.scale + camera.y 
        });
        draw();
    });

    function clearPath() {
        path = []; mode = 'DRAW'; camera.scale = 0.6; camera.x = 0; camera.y = 0;
        document.getElementById('controls-layer').style.display = 'flex';
        document.getElementById('share-panel').style.display = 'none';
        window.removeEventListener('deviceorientation', handleMotion);
        draw();
    }

    function decodePath(str) {
        try {
            const data = JSON.parse(atob(decodeURIComponent(str)));
            path = data.map(p => ({ x: p[0], y: p[1] }));
        } catch(e) {}
    }

    async function sendChallenge() {
        const time = document.getElementById('final-time').innerText;
        const sampled = path.filter((_, i) => i % 5 === 0).map(p => [Math.round(p.x), Math.round(p.y)]);
        const mapData = btoa(JSON.stringify(sampled));
        const link = `${LIFF_URL}?map=${encodeURIComponent(mapData)}&time=${time}`;

        liff.shareTargetPicker([{
            "type": "flex", "altText": `挑戰我畫的賽道！成績 ${time}s`,
            "contents": {
                "type": "bubble",
                "body": { "type": "box", "layout": "vertical", "contents": [
                    { "type": "text", "text": "⚔️ 平衡球戰帖", "weight": "bold", "color": "#06c755", "size": "xl" },
                    { "type": "text", "text": `紀錄：${time}s`, "margin": "md", "size": "lg", "weight": "bold" },
                    { "type": "button", "action": { "type": "uri", "label": "接受挑戰", "uri": link }, "style": "primary", "color": "#06c755", "margin": "xl" }
                ]}
            }
        }]);
    }

    function closeShare() { window.history.replaceState({}, '', window.location.pathname); clearPath(); }
    window.onload = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; draw(); };
</script>
</body>
</html>
