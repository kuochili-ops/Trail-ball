<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LINE 平衡球大師</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --line-green: #06c755; }
        body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#121212; position:fixed; }
        
        /* 診斷控制台：若按鈕沒反應，看這裡寫什麼 */
        #debug-log { position:fixed; top:10px; right:10px; background:rgba(0,0,0,0.7); color:#0f0; font-size:10px; padding:5px; z-index:9999; pointer-events:none; max-width:150px; }

        #ui-overlay { position:fixed; top:50px; left:20px; color:white; z-index:10; pointer-events:none; }
        #timer { font-size:32px; font-weight:bold; color:#f1c40f; }
        
        /* 修正點擊問題：將按鈕容器獨立出來 */
        .controls-container { position:fixed; bottom:50px; left:0; width:100%; display:flex; flex-direction:column; align-items:center; gap:15px; z-index:999; }
        
        .btn { 
            padding:15px 40px; font-size:18px; border-radius:40px; border:none; color:white; font-weight:bold; 
            background:var(--line-green); box-shadow:0 4px 15px rgba(0,0,0,0.5);
            pointer-events: auto !important; cursor:pointer;
        }
        .btn:active { transform:scale(0.9); background:#05a346; }
        .btn:disabled { background:#555; opacity:0.6; }

        canvas { position:absolute; top:0; left:0; z-index:1; }
    </style>
</head>
<body>

<div id="debug-log">系統準備中...</div>

<div id="ui-overlay">
    <div id="status">🎨 請畫出一條長賽道</div>
    <div id="timer">0.00s</div>
</div>

<div class="controls-container" id="menu">
    <select id="ballType" style="padding:10px; border-radius:10px; font-size:16px;">
        <option value="volleyball">🏐 排球</option>
        <option value="basketball">🏀 籃球</option>
    </select>
    <button class="btn" id="startBtn" onclick="forceStart()">確認開始遊戲</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const log = (msg) => { document.getElementById('debug-log').innerText = msg; console.log(msg); };
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let mode = 'DRAW', path = [], ball = { x:0, y:0, vx:0, vy:0 };
    let startTime, baseBeta=0, baseGamma=0;

    // 初始化 LIFF
    liff.init({ liffId: "2009222789-78cVEvXM" }).then(() => {
        log("LIFF 已就緒");
    }).catch(err => log("LIFF 錯誤:"+err));

    // 核心：分離畫布與按鈕事件
    canvas.addEventListener('touchstart', (e) => {
        if(mode !== 'DRAW') return;
        const t = e.touches[0];
        path = [{x: t.clientX, y: t.clientY}];
    }, {passive:true});

    canvas.addEventListener('touchmove', (e) => {
        if(mode !== 'DRAW') return;
        const t = e.touches[0];
        path.push({x: t.clientX, y: t.clientY});
        draw();
    }, {passive:true});

    // 暴力啟動函式
    async function forceStart() {
        log("啟動按鈕已被點擊");
        if(path.length < 5) {
            alert("請先在螢幕上畫出賽道！");
            return;
        }

        // 嘗試請求權限
        try {
            if (window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === 'function') {
                log("請求 iOS 權限...");
                const res = await DeviceOrientationEvent.requestPermission();
                log("權限結果: " + res);
            }
        } catch(e) { log("權限跳過: " + e); }

        startGame();
    }

    function startGame() {
        log("進入校準模式");
        document.getElementById('status').innerText = "⏳ 請平放手機...";
        document.getElementById('menu').style.display = 'none';

        // 抓取初始角度
        const capture = (e) => {
            if (e.beta !== null) {
                baseBeta = e.beta; baseGamma = e.gamma;
                window.removeEventListener('deviceorientation', capture);
                
                mode = 'PLAY';
                ball.x = path[0].x; ball.y = path[0].y;
                startTime = Date.now();
                window.addEventListener('deviceorientation', (ev) => {
                    ball.vx += (ev.gamma - baseGamma) * 0.05;
                    ball.vy += (ev.beta - baseBeta) * 0.05;
                });
                animate();
                log("遊戲開始！");
            }
        };
        window.addEventListener('deviceorientation', capture);
    }

    function animate() {
        if(mode !== 'PLAY') return;
        ball.vx *= 0.97; ball.vy *= 0.97;
        ball.x += ball.vx; ball.y += ball.vy;
        
        // 簡單路徑判定
        let onPath = false;
        path.forEach(p => { if(Math.hypot(ball.x-p.x, ball.y-p.y) < 30) onPath = true; });
        if(!onPath) { ball.x = path[0].x; ball.y = path[0].y; ball.vx=0; ball.vy=0; }

        draw();
        document.getElementById('timer').innerText = ((Date.now() - startTime)/1000).toFixed(2) + "s";
        requestAnimationFrame(animate);
    }

    function draw() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        if(path.length > 1) {
            ctx.strokeStyle = "#444"; ctx.lineWidth = 40; ctx.lineCap = "round"; ctx.lineJoin = "round";
            ctx.beginPath(); ctx.moveTo(path[0].x, path[0].y);
            path.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();
        }
        if(mode === 'PLAY') {
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(ball.x, ball.y, 15, 0, Math.PI*2); ctx.fill();
        }
    }

    window.onload = () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        log("等待畫賽道...");
    };
</script>
</body>
</html>
