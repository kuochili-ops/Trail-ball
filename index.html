<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LINE 平衡球大師挑戰</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --line-green: #06c755; --bg: #121212; }
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: -apple-system, sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui-overlay { position: fixed; top: 50px; left: 20px; color: white; pointer-events: none; z-index: 10; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        #timer { font-size: 28px; font-family: monospace; font-weight: bold; margin-top: 5px; }
        .controls { position: fixed; bottom: 50px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 100; }
        .btn-group { display: flex; gap: 12px; }
        button { padding: 15px 28px; font-size: 16px; border-radius: 35px; border: none; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        .btn-main { background: var(--line-green); }
        .btn-alt { background: #4a4a4a; }
        select { padding: 12px 18px; border-radius: 15px; background: white; border: 2px solid var(--line-green); font-size: 16px; }
        #share-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; background: #1a1a1a; border: 1.5px solid var(--line-green); border-radius: 25px; padding: 25px; color: white; text-align: center; z-index: 1000; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

<div id="ui-overlay"><div id="status">🎨 載入中...</div><div id="timer">0.00s</div></div>
<div class="controls" id="menu">
    <select id="ballType">
        <option value="volleyball">🏐 排球 (輕快)</option>
        <option value="basketball">🏀 籃球 (擬真翻滾)</option>
        <option value="soccer">⚽ 足球 (黑白幾何)</option>
        <option value="nineball">🎱 九號球 (帶狀旋轉)</option>
    </select>
    <div class="btn-group">
        <button class="btn-alt" id="clearBtn" onclick="clearPath()">擦除重畫</button>
        <button class="btn-main" onclick="handleStartClick()">確認開始</button>
    </div>
</div>

<div id="share-panel">
    <div style="font-size: 22px; color: #06c755; font-weight: bold; margin-bottom: 10px;">🏆 挑戰成功！</div>
    <p>你的成績：<span id="final-time" style="color: #f1c40f; font-weight: bold; font-size: 24px;">0.00</span>s</p>
    <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
        <button class="btn-main" onclick="sendChallenge()">💬 再發送一次戰帖</button>
        <button class="btn-alt" onclick="closeShare()">我也要畫賽道</button>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const LIFF_ID = "2009222789-78cVEvXM"; 
    const LIFF_URL = "https://liff.line.me/2009222789-78cVEvXM"; 

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let mode = 'DRAW', path = [], ball = { x: 0, y: 0, vx: 0, vy: 0, radius: 18, rotation: 0, dist: 0 }, camera = { x: 0, y: 0, scale: 0.6 }, baseBeta = 0, baseGamma = 0, startTime;

    async function initLiff() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const urlParams = new URLSearchParams(window.location.search);
                const mapData = urlParams.get('map');
                const timeRec = urlParams.get('time');

                if (mapData) {
                    decodePath(mapData);
                    document.getElementById('status').innerText = timeRec ? `🏁 挑戰朋友的 ${timeRec}s！` : "🏁 賽道已載入";
                    document.getElementById('clearBtn').innerText = "回首頁重畫";
                    draw();
                } else {
                    document.getElementById('status').innerText = "🎨 畫出你的路徑";
                }
            }
        } catch (e) { console.error(e); }
    }

    // 核心優化：統一點擊啟動邏輯
    function handleStartClick() {
        if (path.length < 5) { alert("請先畫出賽道！"); return; }
        
        // 請求 iOS 陀螺儀權限
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission()
                .then(res => { if (res === 'granted') startCalibration(); else alert("需要權限才能玩喔！"); })
                .catch(err => { console.error(err); startCalibration(); });
        } else {
            startCalibration(); // 非 iOS 設備直接啟動
        }
    }

    function startCalibration() {
        // 先移除舊監聽器防止重複啟動
        window.removeEventListener('deviceorientation', handleMotion);
        
        // 抓取基準重力值
        const capture = (e) => {
            if (e.beta !== null) {
                baseBeta = e.beta; 
                baseGamma = e.gamma;
                window.removeEventListener('deviceorientation', capture);
                
                // 正式開始
                mode = 'PLAY';
                camera.scale = 1.0;
                document.getElementById('menu').style.display = 'none';
                ball.x = path[0].x; ball.y = path[0].y;
                ball.vx = 0; ball.vy = 0; ball.dist = 0;
                startTime = Date.now();
                
                window.addEventListener('deviceorientation', handleMotion);
                animate();
            }
        };
        window.addEventListener('deviceorientation', capture);
    }

    function handleMotion(e) {
        if (mode !== 'PLAY') return;
        // 增加感應靈敏度與重置補償
        const dx = (e.gamma - baseGamma);
        const dy = (e.beta - baseBeta);
        ball.vx += dx * 0.035; 
        ball.vy += dy * 0.035;
    }

    // --- 分享與解碼 ---
    async function sendChallenge() {
        const time = document.getElementById('final-time').innerText;
        const sampledPath = path.filter((_, i) => i % 7 === 0).map(p => [Math.round(p.x), Math.round(p.y)]);
        const mapBase64 = btoa(JSON.stringify(sampledPath));
        const challengeLink = `${LIFF_URL}?map=${encodeURIComponent(mapBase64)}&time=${time}`;

        if (liff.isApiAvailable('shareTargetPicker')) {
            try {
                await liff.shareTargetPicker([{
                    "type": "flex", "altText": "有人挑戰你玩平衡球！",
                    "contents": {
                        "type": "bubble", "body": {
                            "type": "box", "layout": "vertical", "contents": [
                                {"type": "text", "text": "⚖️ 平衡球戰帖", "weight": "bold", "color": "#06c755", "size": "xl"},
                                {"type": "text", "text": `挑戰紀錄：${time}s`, "margin": "md", "size": "lg", "weight": "bold"},
                                {"type": "text", "text": "點擊下方按鈕挑戰！", "size": "xs", "color": "#999999"}
                            ]
                        },
                        "footer": {
                            "type": "box", "layout": "vertical", "contents": [
                                {"type": "button", "action": {"type": "uri", "label": "接受挑戰", "uri": challengeLink}, "style": "primary", "color": "#06c755"}
                            ]
                        }
                    }
                }]);
                closeShare();
            } catch (err) { window.location.href = `https://line.me/R/msg/text/?挑戰我的紀錄 ${time}s！%0D%0A${challengeLink}`; }
        }
    }

    function decodePath(str) {
        try {
            const data = JSON.parse(atob(decodeURIComponent(str)));
            path = data.map(p => ({ x: p[0], y: p[1] }));
        } catch(e) { console.error(e); }
    }

    // --- 遊戲渲染引擎 ---
    function init() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; initLiff(); draw(); }
    window.addEventListener('resize', init); init();

    function getMessagePos(e) { return { x: (e.clientX - canvas.width/2) / camera.scale + camera.x, y: (e.clientY - canvas.height/2) / camera.scale + camera.y }; }
    canvas.addEventListener('pointermove', (e) => { if (mode === 'DRAW' && e.buttons === 1) { path.push(getMessagePos(e)); draw(); } });

    function clearPath() {
        path = []; mode = 'DRAW'; camera.scale = 0.6; camera.x = 0; camera.y = 0;
        document.getElementById('menu').style.display = 'flex';
        document.getElementById('share-panel').style.display = 'none';
        document.getElementById('status').innerText = "🎨 畫出你的路徑";
        document.getElementById('clearBtn').innerText = "擦除重畫";
        // 停止運動監聽
        window.removeEventListener('deviceorientation', handleMotion);
        draw();
    }

    function animate() {
        if (mode !== 'PLAY') return;
        ball.vx *= 0.95; ball.vy *= 0.95;
        ball.x += ball.vx; ball.y += ball.vy;
        
        if (Math.hypot(ball.vx, ball.vy) > 0.1) {
            ball.rotation = Math.atan2(ball.vy, ball.vx);
            ball.dist += Math.hypot(ball.vx, ball.vy);
        }
        
        camera.x = ball.x; camera.y = ball.y;
        
        let onPath = false;
        for (let i = 0; i < path.length; i += 3) {
            if (Math.hypot(ball.x - path[i].x, ball.y - path[i].y) < 38) { onPath = true; break; }
        }
        
        if (!onPath) { ball.x = path[0].x; ball.y = path[0].y; ball.vx = 0; ball.vy = 0; }
        
        if (Math.hypot(ball.x - path[path.length-1].x, ball.y - path[path.length-1].y) < 25) {
            handleWin(); return;
        }
        
        draw();
        document.getElementById('timer').innerText = ((Date.now() - startTime)/1000).toFixed(2) + "s";
        requestAnimationFrame(animate);
    }

    function handleWin() {
        mode = 'GOAL';
        document.getElementById('final-time').innerText = ((Date.now() - startTime)/1000).toFixed(2);
        document.getElementById('share-panel').style.display = 'block';
        window.removeEventListener('deviceorientation', handleMotion);
    }

    function closeShare() {
        document.getElementById('share-panel').style.display = 'none';
        const url = new URL(window.location.href);
        url.search = ''; // 清除挑戰參數
        window.history.replaceState({}, '', url);
        clearPath();
    }

    function drawBall(x, y, type) {
        ctx.save(); ctx.translate(x, y); ctx.beginPath(); ctx.arc(0, 0, ball.radius, 0, Math.PI*2); ctx.clip(); ctx.rotate(ball.rotation);
        const d = ball.dist; const r = ball.radius;
        if (type === 'volleyball') {
            ctx.fillStyle = '#fff'; ctx.fill(); ctx.strokeStyle = '#2980b9'; ctx.lineWidth = 1.5;
            for(let i=-2; i<=2; i++){ let s = (d + i*25)%100-50; ctx.beginPath(); ctx.moveTo(-20, s); ctx.bezierCurveTo(0, s+15, 0, s-15, 20, s); ctx.stroke(); }
        } else if (type === 'basketball') {
            ctx.fillStyle = '#e67e22'; ctx.fill(); ctx.strokeStyle = '#222'; ctx.lineWidth = 1.8;
            for(let i = -3; i <= 3; i++) { let shift = (d + i * r * 3) % (r * 6) - (r * 3); ctx.beginPath(); ctx.arc(shift, 0, r * 1.2, 0, Math.PI * 2); ctx.stroke(); }
        } else if (type === 'soccer') {
            ctx.fillStyle = '#fff'; ctx.fill(); ctx.fillStyle = '#000';
            for(let i = -5; i <= 5; i++) { for(let j = -3; j <= 3; j++) { let sx = (d + i * 18) % 72 - 36; if((i+j)%2 === 0) ctx.fillRect(sx, j*18 - 9, 18, 18); } }
        } else {
            ctx.fillStyle = '#fff'; ctx.fill(); ctx.fillStyle = '#f1c40f';
            for(let i = -2; i <= 2; i++) { let sx = (d + i * r * 4) % (r * 8) - (r * 4); ctx.fillRect(sx - 10, -r, 20, r*2); ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(sx, 0, 8, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#000'; ctx.font = 'bold 10px Arial'; ctx.textAlign='center'; ctx.fillText('9', sx, 4); }
        }
        ctx.restore();
        ctx.save(); ctx.translate(x, y); let grad = ctx.createRadialGradient(-r/2, -r/2, 2, 0, 0, r); grad.addColorStop(0, "rgba(255,255,255,0.4)"); grad.addColorStop(1, "rgba(0,0,0,0.5)"); ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill(); ctx.restore();
    }

    function draw() {
        ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,canvas.width, canvas.height); ctx.translate(canvas.width/2, canvas.height/2); ctx.scale(camera.scale, camera.scale); ctx.translate(-camera.x, -camera.y);
        if (path.length > 0) {
            ctx.strokeStyle = "#1a1a1a"; ctx.lineWidth = 86; ctx.lineJoin="round"; ctx.lineCap="round"; ctx.beginPath(); ctx.moveTo(path[0].x, path[0].y); path.forEach(p=>ctx.lineTo(p.x, p.y)); ctx.stroke();
            ctx.strokeStyle = "#3d3d3d"; ctx.lineWidth = 76; ctx.beginPath(); ctx.moveTo(path[0].x, path[0].y); path.forEach(p=>ctx.lineTo(p.x, p.y)); ctx.stroke();
            ctx.fillStyle="#28a745"; ctx.beginPath(); ctx.arc(path[0].x, path[0].y, 15, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle="#dc3545"; ctx.beginPath(); ctx.arc(path[path.length-1].x, path[path.length-1].y, 25, 0, Math.PI*2); ctx.fill();
        }
        const isDrawing = mode === 'DRAW' && path.length > 0;
        const p = mode === 'PLAY' ? ball : (isDrawing ? path[path.length-1] : {x:0, y:0});
        if(mode === 'PLAY' || isDrawing) drawBall(p.x, p.y, document.getElementById('ballType').value);
    }
</script>
</body>
</html>
