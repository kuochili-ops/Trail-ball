<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LINE 平衡球：擬真物理滾動</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui { position: fixed; top: 20px; left: 20px; color: white; pointer-events: none; z-index: 10; }
        .controls { position: fixed; bottom: 30px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 10; }
        button { padding: 12px 24px; font-size: 16px; border-radius: 30px; border: none; color: white; font-weight: bold; background: #28a745; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        select { padding: 10px; border-radius: 10px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="ui">
    <div id="status">🎨 繪製模式</div>
    <div id="timer">0.00s</div>
</div>

<div class="controls" id="menu">
    <select id="ballType">
        <option value="basketball">籃球 (擬真皮紋)</option>
        <option value="soccer">足球 (幾何塊面)</option>
        <option value="nineball">九號球 (帶狀滾動)</option>
    </select>
    <button onclick="requestPermission()">開始挑戰</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const ballSelect = document.getElementById('ballType');
    
    let mode = 'DRAW'; 
    let path = [];
    let ball = { x: 0, y: 0, vx: 0, vy: 0, radius: 18, offsetX: 0, offsetY: 0 };
    let camera = { x: 0, y: 0, scale: 0.6 };
    let baseBeta = 0, baseGamma = 0, startTime;

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        draw();
    }
    window.addEventListener('resize', init);
    init();

    // 取得世界座標
    function getMessagePos(e) {
        return {
            x: (e.clientX - canvas.width/2) / camera.scale + camera.x,
            y: (e.clientY - canvas.height/2) / camera.scale + camera.y
        };
    }

    canvas.addEventListener('pointermove', (e) => {
        if (mode === 'DRAW' && e.buttons === 1) {
            path.push(getMessagePos(e));
            draw();
        }
    });

    function requestPermission() {
        if (path.length < 10) return;
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(res => { if (res === 'granted') startCalibration(); });
        } else { startCalibration(); }
    }

    function startCalibration() {
        const capture = (e) => {
            baseBeta = e.beta; baseGamma = e.gamma;
            window.removeEventListener('deviceorientation', capture);
            mode = 'PLAY'; camera.scale = 1.0;
            document.getElementById('menu').style.display = 'none';
            ball.x = path[0].x; ball.y = path[0].y;
            startTime = Date.now();
            window.addEventListener('deviceorientation', handleMotion);
            animate();
        };
        window.addEventListener('deviceorientation', capture);
    }

    function handleMotion(e) {
        if (mode !== 'PLAY') return;
        ball.vx += (e.gamma - baseGamma) * 0.015;
        ball.vy += (e.beta - baseBeta) * 0.015;
    }

    function animate() {
        if (mode !== 'PLAY') return;
        ball.vx *= 0.95; ball.vy *= 0.95;
        ball.x += ball.vx; ball.y += ball.vy;

        // --- 核心更新：根據位移計算紋理偏移 (這就是滾動感) ---
        // 偏移量累加，模擬球體表面的點在移動
        ball.offsetX = (ball.offsetX + ball.vx) % (ball.radius * 4);
        ball.offsetY = (ball.offsetY + ball.vy) % (ball.radius * 4);

        camera.x = ball.x; camera.y = ball.y;

        // 碰撞判定 (簡化)
        let onPath = false;
        for (let i = 0; i < path.length; i += 2) {
            if (Math.hypot(ball.x - path[i].x, ball.y - path[i].y) < 38) { onPath = true; break; }
        }
        if (!onPath) { 
            alert("掉落了！"); 
            mode = 'DRAW'; camera.scale = 0.6; 
            document.getElementById('menu').style.display = 'flex';
            return; 
        }

        draw();
        document.getElementById('timer').innerText = ((Date.now() - startTime)/1000).toFixed(2) + "s";
        requestAnimationFrame(animate);
    }

    function drawBall(x, y, type) {
        ctx.save();
        ctx.translate(x, y);
        
        // 1. 畫球體外框與遮罩
        ctx.beginPath();
        ctx.arc(0, 0, ball.radius, 0, Math.PI*2);
        ctx.clip();

        // 2. 根據類型繪製滾動紋路
        const ox = ball.offsetX;
        const oy = ball.offsetY;

        if (type === 'basketball') {
            ctx.fillStyle = '#e67e22'; ctx.fill();
            ctx.strokeStyle = '#222'; ctx.lineWidth = 1.5;
            // 橫向與縱向線條，隨位移滾動
            for(let i = -2; i <= 2; i++) {
                ctx.beginPath();
                ctx.arc(ox - i*40, oy, 30, 0, Math.PI*2); // 模擬球面弧線
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(-20, oy - i*20); ctx.lineTo(20, oy - i*20);
                ctx.stroke();
            }
        } else if (type === 'soccer') {
            ctx.fillStyle = '#fff'; ctx.fill();
            ctx.fillStyle = '#000';
            // 模擬足球方塊滾動
            for(let i=-2; i<2; i++) {
                for(let j=-2; j<2; j++) {
                    if((i+j)%2==0) ctx.fillRect(ox + i*20, oy + j*20, 12, 12);
                }
            }
        } else if (type === 'nineball') {
            ctx.fillStyle = '#fff'; ctx.fill();
            // 黃色色帶隨位移上下滾動
            ctx.fillStyle = '#f1c40f';
            ctx.fillRect(-20, oy - 10, 40, 20);
            ctx.fillRect(-20, oy - 10 + 60, 40, 20);
            ctx.fillRect(-20, oy - 10 - 60, 40, 20);
            // 數字
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(0, oy % 60, 8, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#000'; ctx.font = 'bold 10px Arial'; ctx.textAlign='center'; ctx.fillText('9', 0, (oy % 60)+4);
        }

        // 3. 蓋上固定的光影 (最重要：讓它看起來像 3D)
        ctx.restore();
        ctx.save();
        ctx.translate(x, y);
        let grad = ctx.createRadialGradient(-ball.radius/3, -ball.radius/3, 2, 0, 0, ball.radius);
        grad.addColorStop(0, "rgba(255,255,255,0.4)");
        grad.addColorStop(0.6, "rgba(0,0,0,0)");
        grad.addColorStop(1, "rgba(0,0,0,0.5)");
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(0, 0, ball.radius, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }

    function draw() {
        ctx.setTransform(1,0,0,1,0,0);
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.scale(camera.scale, camera.scale);
        ctx.translate(-camera.x, -camera.y);

        if (path.length > 0) {
            ctx.strokeStyle = "#111"; ctx.lineWidth = 86; ctx.lineJoin="round"; ctx.lineCap="round";
            ctx.beginPath(); ctx.moveTo(path[0].x, path[0].y); path.forEach(p=>ctx.lineTo(p.x, p.y)); ctx.stroke();
            ctx.strokeStyle = "#444"; ctx.lineWidth = 76;
            ctx.beginPath(); ctx.moveTo(path[0].x, path[0].y); path.forEach(p=>ctx.lineTo(p.x, p.y)); ctx.stroke();
            
            ctx.fillStyle="#28a745"; ctx.beginPath(); ctx.arc(path[0].x, path[0].y, 15, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle="#dc3545"; ctx.beginPath(); ctx.arc(path[path.length-1].x, path[path.length-1].y, 25, 0, Math.PI*2); ctx.fill();
        }

        if (mode === 'PLAY' || (mode === 'DRAW' && path.length > 0)) {
            const p = mode === 'PLAY' ? ball : path[path.length-1];
            drawBall(p.x, p.y, ballSelect.value);
        }
    }
</script>
</body>
</html>
