<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>𓃥 白六平衡球：旗艦完整版</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --line-green: #06c755; --bg: #121212; }
        body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:var(--bg); position:fixed; font-family: sans-serif; }
        
        #ui-layer { position: fixed; top: 60px; left: 20px; color: white; pointer-events: none; z-index: 10; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        #timer { font-size: 32px; font-weight: bold; color: #f1c40f; }

        #controls-container { 
            position: fixed; bottom: 40px; left: 0; width: 100%; 
            display: flex; flex-direction: column; align-items: center; gap: 12px; 
            z-index: 9999; pointer-events: none;
        }
        .interactive { pointer-events: auto !important; }

        .btn-group { display: flex; gap: 10px; }
        button { 
            padding: 12px 24px; font-size: 16px; border-radius: 30px; border: none; color: white; font-weight: bold; 
            background: var(--line-green); box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer;
        }
        button:active { transform: scale(0.9); }
        .btn-reset { background: #e67e22; } /* 回復鍵顏色 */
        .btn-clear { background: #4a4a4a; }

        select { padding: 10px 15px; border-radius: 12px; font-size: 16px; border: 2px solid var(--line-green); }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; touch-action: none; }

        #share-panel { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 85%; background: #1a1a1a; border: 2px solid var(--line-green); border-radius: 25px; 
            padding: 25px; color: white; text-align: center; z-index: 10000; 
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="status">🎨 繪製賽道</div>
    <div id="timer">0.00s</div>
</div>

<div id="controls-container">
    <select id="ballType" class="interactive">
        <option value="volleyball">🏐 排球</option>
        <option value="basketball">🏀 籃球</option>
        <option value="soccer">⚽ 足球</option>
        <option value="nineball">🎱 九號球</option>
    </select>
    <div class="btn-group interactive">
        <button class="btn-clear" onclick="clearPath()">清空重畫</button>
        <button class="btn-reset" id="resetBtn" onclick="backToReady()" style="display:none;">回復</button>
        <button id="startBtn" onclick="handleStart()">開始滾球</button>
    </div>
</div>

<div id="share-panel">
    <h2 style="color:var(--line-green);">🏆 抵達終點！</h2>
    <p>秒數：<span id="final-time">0.00</span>s</p>
    <button class="interactive" onclick="sendChallenge()" style="width:100%; margin-bottom:10px;">💬 發送戰帖</button>
    <button class="btn-reset interactive" onclick="backToReady()" style="width:100%;">回到準備狀態</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const LIFF_ID = "2009222789-78cVEvXM";
    const LIFF_URL = "https://liff.line.me/2009222789-78cVEvXM";
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let mode = 'DRAW', path = [], ball = { x: 0, y: 0, vx: 0, vy: 0, radius: 18, rotation: 0, dist: 0 };
    let camera = { x: 0, y: 0, scale: 0.6 }, baseBeta = 0, baseGamma = 0, startTime;

    liff.init({ liffId: LIFF_ID }).then(() => {
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.get('map')) decodePath(urlParams.get('map'));
        draw();
    });

    // --- 核心邏輯：回到準備狀態 ---
    function backToReady() {
        mode = 'DRAW';
        camera.scale = 0.6; // 縮放回全景
        camera.x = 0; camera.y = 0;
        ball.vx = 0; ball.vy = 0;
        ball.dist = 0;
        
        document.getElementById('status').innerText = "🎨 已就緒，可點擊開始";
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('resetBtn').style.display = 'none';
        document.getElementById('share-panel').style.display = 'none';
        
        window.removeEventListener('deviceorientation', handleMotion);
        draw();
    }

    function clearPath() {
        path = [];
        backToReady();
        document.getElementById('status').innerText = "🎨 請繪製賽道";
    }

    async function handleStart() {
        if (path.length < 5) { alert("請先繪製賽道"); return; }
        
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            const res = await DeviceOrientationEvent.requestPermission();
            if (res === 'granted') startCalibration();
        } else { startCalibration(); }
    }

    function startCalibration() {
        document.getElementById('status').innerText = "⏳ 請平放手機校準...";
        setTimeout(() => {
            const capture = (e) => {
                if (e.beta !== null) {
                    baseBeta = e.beta; baseGamma = e.gamma;
                    window.removeEventListener('deviceorientation', capture);
                    
                    mode = 'PLAY';
                    camera.scale = 1.2; // 進入跟隨模式
                    ball.x = path[0].x; ball.y = path[0].y;
                    startTime = Date.now();
                    
                    document.getElementById('startBtn').style.display = 'none';
                    document.getElementById('resetBtn').style.display = 'block';
                    document.getElementById('status').innerText = "🚀 挑戰中！";
                    
                    window.addEventListener('deviceorientation', handleMotion);
                    animate();
                }
            };
            window.addEventListener('deviceorientation', capture);
        }, 500);
    }

    function handleMotion(e) {
        ball.vx += (e.gamma - baseGamma) * 0.05;
        ball.vy += (e.beta - baseBeta) * 0.05;
    }

    function animate() {
        if (mode !== 'PLAY') return;
        ball.vx *= 0.97; ball.vy *= 0.97;
        ball.x += ball.vx; ball.y += ball.vy;
        camera.x = ball.x; camera.y = ball.y;

        // 計算滾動旋轉
        if (Math.hypot(ball.vx, ball.vy) > 0.1) {
            ball.rotation = Math.atan2(ball.vy, ball.vx);
            ball.dist += Math.hypot(ball.vx, ball.vy);
        }

        // 碰撞與終點判定
        let onPath = false;
        for (let i = 0; i < path.length - 1; i++) {
            const l2 = (path[i].x - path[i+1].x)**2 + (path[i].y - path[i+1].y)**2;
            let t = ((ball.x - path[i].x) * (path[i+1].x - path[i].x) + (ball.y - path[i].y) * (path[i+1].y - path[i].y)) / l2;
            t = Math.max(0, Math.min(1, t));
            const d = Math.hypot(ball.x - (path[i].x + t * (path[i+1].x - path[i].x)), ball.y - (path[i].y + t * (path[i+1].y - path[i].y)));
            if (d < 26) { onPath = true; break; }
        }
        if (!onPath) { ball.x = path[0].x; ball.y = path[0].y; ball.vx = 0; ball.vy = 0; }
        
        if (Math.hypot(ball.x - path[path.length-1].x, ball.y - path[path.length-1].y) < 25) {
            mode = 'GOAL';
            document.getElementById('final-time').innerText = ((Date.now() - startTime)/1000).toFixed(2);
            document.getElementById('share-panel').style.display = 'block';
            return;
        }

        draw();
        document.getElementById('timer').innerText = ((Date.now() - startTime)/1000).toFixed(2) + "s";
        requestAnimationFrame(animate);
    }

    // --- 回復精緻球體外觀 ---
    function drawBall(x, y, type) {
        ctx.save(); ctx.translate(x, y); ctx.beginPath(); ctx.arc(0, 0, ball.radius, 0, Math.PI*2); ctx.clip();
        ctx.rotate(ball.rotation);
        const r = ball.radius; const d = ball.dist;

        if (type === 'volleyball') {
            ctx.fillStyle = '#fff'; ctx.fill(); ctx.strokeStyle = '#2980b9'; ctx.lineWidth = 2;
            for(let i=-2; i<=2; i++) {
                let s = (d + i*25)%100-50;
                ctx.beginPath(); ctx.moveTo(-r, s); ctx.bezierCurveTo(0, s+15, 0, s-15, r, s); ctx.stroke();
            }
        } else if (type === 'basketball') {
            ctx.fillStyle = '#e67e22'; ctx.fill(); ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.stroke();
            let s = (d % (r*4)) - r*2;
            ctx.beginPath(); ctx.arc(s, 0, r, 0, Math.PI*2); ctx.stroke();
        } else if (type === 'soccer') {
            ctx.fillStyle = '#fff'; ctx.fill(); ctx.fillStyle = '#222';
            for(let i=-3; i<=3; i++) {
                for(let j=-3; j<=3; j++) {
                    let ox = (d + i*20)%80-40;
                    if((i+j)%2===0) ctx.fillRect(ox, j*20-10, 12, 12);
                }
            }
        } else { // nineball
            ctx.fillStyle = '#f1c40f'; ctx.fill();
            let sx = (d % 120) - 60;
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(sx, 0, 10, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#000'; ctx.font = 'bold 10px Arial'; ctx.textAlign='center'; ctx.fillText('9', sx, 4);
        }
        ctx.restore();
        // 增加立體陰影
        let grad = ctx.createRadialGradient(x-5, y-5, 2, x, y, r);
        grad.addColorStop(0, 'rgba(255,255,255,0.3)'); grad.addColorStop(1, 'rgba(0,0,0,0.4)');
        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
    }

    function draw() {
        ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.translate(canvas.width/2, canvas.height/2); ctx.scale(camera.scale, camera.scale); ctx.translate(-camera.x, -camera.y);

        if (path.length > 0) {
            ctx.strokeStyle = "#333"; ctx.lineWidth = 45; ctx.lineCap = "round"; ctx.lineJoin = "round";
            ctx.beginPath(); ctx.moveTo(path[0].x, path[0].y); path.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();
            ctx.fillStyle="#06c755"; ctx.beginPath(); ctx.arc(path[0].x, path[0].y, 15, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle="#dc3545"; ctx.beginPath(); ctx.arc(path[path.length-1].x, path[path.length-1].y, 22, 0, Math.PI*2); ctx.fill();
        }
        const p = (mode === 'PLAY') ? ball : (path.length > 0 ? path[path.length-1] : null);
        if(p) drawBall(p.x, p.y, document.getElementById('ballType').value);
    }

    // 觸摸與座標
    canvas.addEventListener('touchstart', (e) => {
        if (mode !== 'DRAW') return;
        const rect = canvas.getBoundingClientRect();
        const t = e.touches[0];
        path = [{ 
            x: (t.clientX - rect.left - canvas.width/2) / camera.scale + camera.x, 
            y: (t.clientY - rect.top - canvas.height/2) / camera.scale + camera.y 
        }];
    });
    canvas.addEventListener('touchmove', (e) => {
        if (mode !== 'DRAW') return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const t = e.touches[0];
        path.push({ 
            x: (t.clientX - rect.left - canvas.width/2) / camera.scale + camera.x, 
            y: (t.clientY - rect.top - canvas.height/2) / camera.scale + camera.y 
        });
        draw();
    });

    function decodePath(str) {
        try { path = JSON.parse(atob(decodeURIComponent(str))).map(p => ({ x: p[0], y: p[1] })); } catch(e) {}
    }

    async function sendChallenge() {
        const time = document.getElementById('final-time').innerText;
        const sampled = path.filter((_, i) => i % 5 === 0).map(p => [Math.round(p.x), Math.round(p.y)]);
        const mapData = btoa(JSON.stringify(sampled));
        const link = `${LIFF_URL}?map=${encodeURIComponent(mapData)}&time=${time}`;
        liff.shareTargetPicker([{
            "type": "flex", "altText": `挑戰我！紀錄 ${time}s`,
            "contents": { "type": "bubble", "body": { "type": "box", "layout": "vertical", "contents": [
                { "type": "text", "text": "⚔️ 平衡球戰帖", "weight": "bold", "color": "#06c755", "size": "xl" },
                { "type": "text", "text": `紀錄：${time}s`, "margin": "md", "size": "lg", "weight": "bold" },
                { "type": "button", "action": { "type": "uri", "label": "接受挑戰", "uri": link }, "style": "primary", "color": "#06c755", "margin": "xl" }
            ]}}
        }]);
    }

    window.onload = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; draw(); };
</script>
</body>
</html>
