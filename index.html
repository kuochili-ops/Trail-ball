<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>白六平衡球</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --line-green: #06c755; --bg: #121212; --accent: #f1c40f; }
        body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:var(--bg); position:fixed; font-family: -apple-system, sans-serif; }
        #ui-layer { position: fixed; top: 60px; left: 20px; color: white; pointer-events: none; z-index: 10; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        #title-display { font-size: 14px; letter-spacing: 2px; color: var(--line-green); margin-bottom: 5px; font-weight: bold; }
        #timer { font-size: 32px; font-weight: bold; color: var(--accent); }
        #controls-container { position: fixed; bottom: 40px; left: 0; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 12px; z-index: 9999; pointer-events: none; }
        .interactive { pointer-events: auto !important; }
        .btn-group { display: flex; gap: 10px; }
        button { padding: 12px 28px; font-size: 16px; border-radius: 30px; border: none; color: white; font-weight: bold; background: var(--line-green); box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer; }
        .btn-reset { background: #e67e22; }
        .btn-clear { background: #4a4a4a; }
        input { width: 80%; text-align: center; padding: 12px; border-radius: 12px; border: 2px solid var(--line-green); background: #fff; font-size: 16px; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; touch-action: none; }
        #share-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; background: #1a1a1a; border: 2px solid var(--line-green); border-radius: 25px; padding: 25px; color: white; text-align: center; z-index: 10000; box-shadow: 0 0 40px rgba(0,0,0,0.9); }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="title-display">⚪️ 白六平衡球</div>
    <div id="status">🎨 繪製賽道</div>
    <div id="timer">0.00s</div>
</div>

<div id="controls-container">
    <div class="btn-group interactive">
        <button class="btn-clear" onclick="clearPath()">清空重畫</button>
        <button id="startBtn" onclick="handleStart()">開始挑戰</button>
        <button class="btn-reset" id="resetBtn" onclick="backToReady()" style="display:none;">放棄重來</button>
    </div>
</div>

<div id="share-panel">
    <h2 style="color:var(--line-green); margin-bottom:5px;">🏆 挑戰成功！</h2>
    <p style="font-size:18px;">紀錄：<span id="final-time" style="color:var(--accent); font-weight:bold;">0.00</span>s</p>
    <div class="interactive" style="margin-bottom:15px;">
        <input type="text" id="msg-input" placeholder="寫下你的挑釁內容..." maxlength="12">
    </div>
    <button class="interactive" onclick="sendChallenge()" style="width:100%; margin-bottom:10px;">💬 發送戰帖</button>
    <button class="btn-reset interactive" onclick="backToReady()" style="width:100%;">返回繪製</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const LIFF_ID = "2009222789-78cVEvXM";
    const LIFF_URL = "https://liff.line.me/" + LIFF_ID;
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let mode = 'DRAW', path = [], ball = { x: 0, y: 0, vx: 0, vy: 0, radius: 18 };
    let camera = { x: 0, y: 0, scale: 0.6 }, baseBeta = 0, baseGamma = 0, startTime;

    liff.init({ liffId: LIFF_ID }).then(() => {
        const urlParams = new URLSearchParams(window.location.search);
        const mData = urlParams.get('m');
        if(mData) {
            decodePath(mData);
            document.getElementById('status').innerText = "🏁 戰帖載入成功";
        }
        draw();
    });

    function backToReady() {
        mode = 'DRAW'; camera.scale = 0.6; camera.x = 0; camera.y = 0;
        ball.vx = 0; ball.vy = 0;
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('resetBtn').style.display = 'none';
        document.getElementById('share-panel').style.display = 'none';
        window.removeEventListener('deviceorientation', handleMotion);
        draw();
    }

    function clearPath() { path = []; backToReady(); }

    async function handleStart() {
        if (path.length < 5) return;
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            const res = await DeviceOrientationEvent.requestPermission();
            if (res === 'granted') startCalibration();
        } else { startCalibration(); }
    }

    function startCalibration() {
        document.getElementById('status').innerText = "⏳ 請平放手機...";
        setTimeout(() => {
            const capture = (e) => {
                if (e.beta !== null) {
                    baseBeta = e.beta; baseGamma = e.gamma;
                    window.removeEventListener('deviceorientation', capture);
                    mode = 'PLAY'; camera.scale = 1.2;
                    ball.x = path[0].x; ball.y = path[0].y;
                    startTime = Date.now();
                    document.getElementById('startBtn').style.display = 'none';
                    document.getElementById('resetBtn').style.display = 'block';
                    window.addEventListener('deviceorientation', handleMotion);
                    animate();
                }
            };
            window.addEventListener('deviceorientation', capture);
        }, 500);
    }

    function handleMotion(e) {
        ball.vx += (e.gamma - baseGamma) * 0.05;
        ball.vy += (e.beta - baseBeta) * 0.05;
    }

    function animate() {
        if (mode !== 'PLAY') return;
        ball.vx *= 0.97; ball.vy *= 0.97;
        ball.x += ball.vx; ball.y += ball.vy;
        camera.x = ball.x; camera.y = ball.y;

        let minDist = 999, bestPoint = { x: ball.x, y: ball.y };
        for (let i = 0; i < path.length - 1; i++) {
            const p1 = path[i], p2 = path[i+1];
            const l2 = (p1.x - p2.x)**2 + (p1.y - p2.y)**2;
            let t = Math.max(0, Math.min(1, ((ball.x-p1.x)*(p2.x-p1.x)+(ball.y-p1.y)*(p2.y-p1.y))/l2));
            const proj = { x: p1.x+t*(p2.x-p1.x), y: p1.y+t*(p2.y-p1.y) };
            const d = Math.hypot(ball.x-proj.x, ball.y-proj.y);
            if (d < minDist) { minDist = d; bestPoint = proj; }
        }

        if (minDist < 28) {
            const speed = Math.hypot(ball.vx, ball.vy);
            const snap = Math.max(0, 0.03 - (speed * 0.015)); 
            if (snap > 0) { ball.x += (bestPoint.x - ball.x) * snap; ball.y += (bestPoint.y - ball.y) * snap; }
        } else {
            ball.x = path[0].x; ball.y = path[0].y; ball.vx = 0; ball.vy = 0;
        }
        
        if (Math.hypot(ball.x - path[path.length-1].x, ball.y - path[path.length-1].y) < 25) {
            mode = 'GOAL';
            document.getElementById('final-time').innerText = ((Date.now() - startTime)/1000).toFixed(2);
            document.getElementById('share-panel').style.display = 'block';
            return;
        }

        draw();
        document.getElementById('timer').innerText = ((Date.now() - startTime)/1000).toFixed(2) + "s";
        requestAnimationFrame(animate);
    }

    function draw() {
        ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.translate(canvas.width/2, canvas.height/2); ctx.scale(camera.scale, camera.scale); ctx.translate(-camera.x, -camera.y);
        if (path.length > 0) {
            ctx.strokeStyle = "#333"; ctx.lineWidth = 45; ctx.lineCap = "round"; ctx.lineJoin = "round";
            ctx.beginPath(); ctx.moveTo(path[0].x, path[0].y); path.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();
            ctx.fillStyle="#06c755"; ctx.beginPath(); ctx.arc(path[0].x, path[0].y, 15, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle="#dc3545"; ctx.beginPath(); ctx.arc(path[path.length-1].x, path[path.length-1].y, 22, 0, Math.PI*2); ctx.fill();
        }
        const p = (mode === 'PLAY') ? ball : (path.length > 0 ? path[path.length-1] : null);
        if(p) { ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(p.x, p.y, 18, 0, Math.PI*2); ctx.fill(); }
    }

    canvas.addEventListener('touchstart', (e) => {
        if (mode !== 'DRAW') return;
        const rect = canvas.getBoundingClientRect(); const t = e.touches[0];
        path = [{ x: (t.clientX - rect.left - canvas.width/2) / camera.scale + camera.x, y: (t.clientY - rect.top - canvas.height/2) / camera.scale + camera.y }];
    });
    canvas.addEventListener('touchmove', (e) => {
        if (mode !== 'DRAW') return; e.preventDefault();
        const rect = canvas.getBoundingClientRect(); const t = e.touches[0];
        path.push({ x: (t.clientX - rect.left - canvas.width/2) / camera.scale + camera.x, y: (t.clientY - rect.top - canvas.height/2) / camera.scale + camera.y });
        draw();
    });

    // --- 加強版壓縮與動態抽樣 ---
    async function sendChallenge() {
        if (path.length < 2) return;
        const time = document.getElementById('final-time').innerText;
        const customMsg = document.getElementById('msg-input').value || "接受我的戰帖吧！";
        
        // 1. 動態計算抽樣密度：如果點太多(如寫字)，加大間隔
        let sampleGap = path.length > 500 ? 50 : 32; 
        
        let lastP = path[0], compact = [Math.round(path[0].x), Math.round(path[0].y)];
        for (let i = 1; i < path.length; i++) {
            const d = Math.hypot(path[i].x - lastP.x, path[i].y - lastP.y);
            if (d > sampleGap || i === path.length - 1) { 
                compact.push(Math.round(path[i].x - lastP.x), Math.round(path[i].y - lastP.y));
                lastP = path[i];
            }
        }
        
        // 2. 二進位封裝
        const int16 = new Int16Array(compact);
        const binary = String.fromCharCode(...new Uint8Array(int16.buffer));
        const mData = btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, ''); 
        
        const link = `${LIFF_URL}?m=${mData}`;

        if (liff.isApiAvailable('shareTargetPicker')) {
            await liff.shareTargetPicker([{
                "type": "flex", "altText": `⚔️ 挑戰 ${time} 秒！`,
                "contents": { "type": "bubble", "body": { "type": "box", "layout": "vertical", "contents": [
                    { "type": "text", "text": "⚪️ 白六平衡球戰帖", "weight": "bold", "color": "#06c755", "size": "md" },
                    { "type": "text", "text": customMsg, "margin": "md", "wrap": true, "weight": "bold" },
                    { "type": "separator", "margin": "md" },
                    { "type": "text", "text": `設計者紀錄：${time}s`, "size": "sm", "color": "#888", "margin": "md" },
                    { "type": "button", "action": { "type": "uri", "label": `挑戰 ${time} 秒`, "uri": link }, "style": "primary", "color": "#06c755", "margin": "xl" }
                ]}}
            }]);
        }
    }

    function decodePath(str) {
        try {
            const base64 = str.replace(/-/g, '+').replace(/_/g, '/');
            const binary = atob(base64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            const pts = new Int16Array(bytes.buffer);
            
            let curX = pts[0], curY = pts[1];
            let newPath = [{ x: curX, y: curY }];
            for (let i = 2; i < pts.length; i += 2) {
                if(isNaN(pts[i])) break;
                curX += pts[i]; curY += pts[i+1];
                newPath.push({ x: curX, y: curY });
            }
            path = newPath;
            camera.x = path[0].x; camera.y = path[0].y;
            draw();
        } catch(e) { console.error("解碼錯誤"); }
    }

    window.onload = () => { 
        canvas.width = window.innerWidth; 
        canvas.height = window.innerHeight; 
        draw(); 
    };
</script>
</body>
</html>
