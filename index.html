<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LINE 平衡球：擬真滾動版</title>
    <style>
        :root { --primary: #28a745; --dark: #000000; }
        body { margin: 0; overflow: hidden; background: var(--dark); font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui { position: fixed; top: 20px; left: 20px; color: white; pointer-events: none; z-index: 10; text-shadow: 1px 1px 2px #000; }
        .controls { position: fixed; bottom: 30px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 10; }
        .btn-group { display: flex; gap: 10px; }
        button { padding: 12px 24px; font-size: 16px; border-radius: 30px; border: none; color: white; font-weight: bold; background: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.5); cursor: pointer; }
        .btn-secondary { background: #555; }
        select { padding: 10px; border-radius: 10px; background: white; border: 2px solid var(--primary); }
    </style>
</head>
<body>

<div id="ui">
    <div id="status">🎨 繪製模式 (雙指縮放已模擬)</div>
    <div id="timer">時間：0.00s</div>
</div>

<div class="controls" id="menu">
    <select id="ballType">
        <option value="soccer">足球 (經典拼貼)</option>
        <option value="basketball">籃球 (皮革質感)</option>
        <option value="tennis">網球 (運動螢光)</option>
        <option value="marble">玻璃珠 (折射光澤)</option>
        <option value="nineball">九號球 (桌球質感)</option>
    </select>
    <div class="btn-group">
        <button class="btn-secondary" onclick="clearPath()">清空</button>
        <button onclick="requestPermission()">確認開始</button>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const ballSelect = document.getElementById('ballType');
    
    let mode = 'DRAW'; 
    let path = [];
    let ball = { 
        x: 0, y: 0, vx: 0, vy: 0, 
        radius: 18, 
        angle: 0 // 新增：球體的旋轉角度
    };
    let camera = { x: 0, y: 0, scale: 0.6 };
    
    const physics = { sensitivity: 0.018, friction: 0.95, maxSpeed: 10, pathWidth: 40, deadzone: 1.2 };
    let baseBeta = 0, baseGamma = 0, startTime;

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        draw();
    }
    window.addEventListener('resize', init);
    init();

    function getMessagePos(e) {
        return {
            x: (e.clientX - canvas.width/2) / camera.scale + camera.x,
            y: (e.clientY - canvas.height/2) / camera.scale + camera.y
        };
    }

    canvas.addEventListener('pointermove', (e) => {
        if (mode === 'DRAW' && e.buttons === 1) {
            path.push(getMessagePos(e));
            draw();
        }
    });

    function clearPath() {
        path = []; mode = 'DRAW'; camera.scale = 0.6; camera.x = 0; camera.y = 0;
        document.getElementById('menu').style.display = 'flex';
        document.getElementById('status').innerText = "🎨 繪製模式 (縮小視野)";
        draw();
    }

    function requestPermission() {
        if (path.length < 20) return alert("請畫出更長的路徑！");
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(res => { if (res === 'granted') startCalibration(); });
        } else { startCalibration(); }
    }

    function startCalibration() {
        const capture = (e) => {
            baseBeta = e.beta; baseGamma = e.gamma;
            window.removeEventListener('deviceorientation', capture);
            mode = 'PLAY'; camera.scale = 1.0;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('status').innerText = "⚖️ 挑戰中！";
            ball.x = path[0].x; ball.y = path[0].y;
            ball.vx = 0; ball.vy = 0; ball.angle = 0;
            startTime = Date.now();
            window.addEventListener('deviceorientation', handleMotion);
            animate();
        };
        window.addEventListener('deviceorientation', capture);
    }

    function handleMotion(e) {
        if (mode !== 'PLAY') return;
        let db = e.beta - baseBeta, dg = e.gamma - baseGamma;
        if (Math.abs(dg) > physics.deadzone) ball.vx += dg * physics.sensitivity;
        if (Math.abs(db) > physics.deadzone) ball.vy += db * physics.sensitivity;
    }

    function animate() {
        if (mode !== 'PLAY') return;
        ball.vx *= physics.friction; ball.vy *= physics.friction;
        
        const speedX = Math.max(Math.min(ball.vx, physics.maxSpeed), -physics.maxSpeed);
        const speedY = Math.max(Math.min(ball.vy, physics.maxSpeed), -physics.maxSpeed);

        ball.x += speedX;
        ball.y += speedY;

        // 計算旋轉感：根據位移量更新角度 (位移越多轉越多)
        // 旋轉方向根據 vx 的正負決定，這裡簡單處理為橫向旋轉感
        ball.angle += (speedX + speedY) / ball.radius;

        camera.x = ball.x;
        camera.y = ball.y;

        let onPath = false;
        for (let i = 0; i < path.length; i += 2) {
            if (Math.hypot(ball.x - path[i].x, ball.y - path[i].y) < physics.pathWidth) {
                onPath = true; break;
            }
        }

        if (!onPath) {
            const retry = confirm("球掉落深淵了！");
            if (retry) { ball.x = path[0].x; ball.y = path[0].y; ball.vx = 0; ball.vy = 0; }
            else { clearPath(); return; }
        }

        if (Math.hypot(ball.x - path[path.length-1].x, ball.y - path[path.length-1].y) < 25) {
            alert("Goal!! 用時: " + ((Date.now() - startTime)/1000).toFixed(2) + "s");
            clearPath(); return;
        }

        draw();
        document.getElementById('timer').innerText = `時間：${((Date.now() - startTime)/1000).toFixed(2)}s`;
        requestAnimationFrame(animate);
    }

    function drawBall(x, y, type, angle) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle); // 關鍵：讓繪圖內容根據運動角度旋轉
        
        ctx.beginPath();
        ctx.arc(0, 0, ball.radius, 0, Math.PI*2);
        ctx.clip(); // 確保內容不會畫出球體外

        if (type === 'soccer') {
            ctx.fillStyle = '#fff'; ctx.fill();
            ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5;
            for(let i=0; i<6; i++) {
                ctx.rotate(Math.PI/3);
                ctx.beginPath();
                ctx.moveTo(0,0); ctx.lineTo(10, -10); ctx.lineTo(18, 0); ctx.lineTo(10, 10);
                ctx.closePath(); ctx.stroke(); ctx.fillStyle = (i%2==0)?'#000':'#fff'; ctx.fill();
            }
        } else if (type === 'basketball') {
            ctx.fillStyle = '#ff8c00'; ctx.fill();
            ctx.strokeStyle = '#222'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(-18, 0); ctx.lineTo(18, 0); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, -18); ctx.lineTo(0, 18); ctx.stroke();
            ctx.beginPath(); ctx.arc(22, 0, 15, Math.PI*0.7, Math.PI*1.3); ctx.stroke();
            ctx.beginPath(); ctx.arc(-22, 0, 15, -Math.PI*0.3, Math.PI*0.3); ctx.stroke();
        } else if (type === 'tennis') {
            ctx.fillStyle = '#d4fc2b'; ctx.fill();
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(18, 18, 20, Math.PI, Math.PI*1.5); ctx.stroke();
            ctx.beginPath(); ctx.arc(-18, -18, 20, 0, Math.PI*0.5); ctx.stroke();
        } else if (type === 'marble') {
            let g = ctx.createRadialGradient(-5, -5, 2, 0, 0, 18);
            g.addColorStop(0, '#fff'); g.addColorStop(0.3, '#00d4ff'); g.addColorStop(1, '#0055ff');
            ctx.fillStyle = g; ctx.fill();
            // 內部的旋轉紋路
            ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.beginPath(); ctx.moveTo(-10, 0); ctx.quadraticCurveTo(0, 15, 10, 0); ctx.stroke();
        } else { // 9-ball
            ctx.fillStyle = '#fff'; ctx.fill();
            ctx.fillStyle = '#ffd700'; ctx.fillRect(-18, -10, 36, 20);
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#000'; ctx.font = 'bold 10px arial'; ctx.textAlign='center'; ctx.fillText('9', 0, 4);
        }
        
        // 外部光影 (覆蓋在旋轉內容之上)
        ctx.restore();
        ctx.save();
        ctx.translate(x, y);
        let shadowGrad = ctx.createRadialGradient(-6, -6, 2, 0, 0, 18);
        shadowGrad.addColorStop(0, "rgba(255,255,255,0.4)");
        shadowGrad.addColorStop(0.5, "rgba(0,0,0,0)");
        shadowGrad.addColorStop(1, "rgba(0,0,0,0.4)");
        ctx.fillStyle = shadowGrad;
        ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }

    function draw() {
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.scale(camera.scale, camera.scale);
        ctx.translate(-camera.x, -camera.y);

        if (path.length > 0) {
            ctx.shadowBlur = 0;
            // 繪製深灰色路徑
            ctx.beginPath(); ctx.strokeStyle = "#111"; ctx.lineWidth = physics.pathWidth * 2 + 10;
            ctx.lineJoin = "round"; ctx.lineCap = "round";
            ctx.moveTo(path[0].x, path[0].y); path.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();
            
            ctx.beginPath(); ctx.strokeStyle = "#444"; ctx.lineWidth = physics.pathWidth * 2;
            ctx.stroke();

            // 起終點
            ctx.fillStyle = "#28a745"; ctx.beginPath(); ctx.arc(path[0].x, path[0].y, 15, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#dc3545"; ctx.beginPath(); ctx.arc(path[path.length-1].x, path[path.length-1].y, 25, 0, Math.PI*2); ctx.fill();
        }

        const isDrawing = mode === 'DRAW' && path.length > 0;
        const ballPos = mode === 'PLAY' ? ball : (isDrawing ? path[path.length-1] : {x:0, y:0});
        
        if (mode === 'PLAY' || isDrawing) {
            drawBall(ballPos.x, ballPos.y, ballSelect.value, ball.angle);
        }
    }
</script>
</body>
</html>
