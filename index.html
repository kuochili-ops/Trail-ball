<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LINE 平衡球：大師挑戰</title>
    <style>
        :root { --primary: #28a745; --dark: #000000; --path: #444444; }
        body { margin: 0; overflow: hidden; background: var(--dark); font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui { position: fixed; top: 20px; left: 20px; color: white; pointer-events: none; z-index: 10; }
        .controls { position: fixed; bottom: 30px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 10; }
        .btn-group { display: flex; gap: 10px; }
        button { padding: 12px 24px; font-size: 16px; border-radius: 30px; border: none; color: white; font-weight: bold; background: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .btn-secondary { background: #555; }
        select { padding: 10px; border-radius: 10px; background: white; border: 2px solid var(--primary); }
    </style>
</head>
<body>

<div id="ui">
    <div id="status">🎨 繪製模式 (縮小視野)</div>
    <div id="timer">時間：0.00s</div>
</div>

<div class="controls" id="menu">
    <select id="ballType">
        <option value="soccer">足球 (黑白幾何)</option>
        <option value="basketball">籃球 (橘皮顆粒)</option>
        <option value="tennis">網球 (黃色細毛)</option>
        <option value="marble">玻璃珠 (半透明)</option>
        <option value="nineball">九號球 (黃色帶狀)</option>
    </select>
    <div class="btn-group">
        <button class="btn-secondary" onclick="clearPath()">清空</button>
        <button onclick="requestPermission()">確認路徑並開始</button>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const ballSelect = document.getElementById('ballType');
    
    let mode = 'DRAW'; 
    let path = [];
    let ball = { x: 0, y: 0, vx: 0, vy: 0, radius: 18 };
    let camera = { x: 0, y: 0, scale: 0.6 }; // 繪圖時預設縮小
    
    const physics = { sensitivity: 0.015, friction: 0.94, maxSpeed: 8, pathWidth: 38, deadzone: 1.5 };
    let baseBeta = 0, baseGamma = 0, startTime;

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        draw();
    }
    window.addEventListener('resize', init);
    init();

    // 座標轉換：將螢幕座標轉為世界座標
    function getMessagePos(e) {
        return {
            x: (e.clientX - canvas.width/2) / camera.scale + camera.x,
            y: (e.clientY - canvas.height/2) / camera.scale + camera.y
        };
    }

    canvas.addEventListener('pointermove', (e) => {
        if (mode === 'DRAW' && e.buttons === 1) {
            path.push(getMessagePos(e));
            draw();
        }
    });

    function clearPath() {
        path = []; mode = 'DRAW'; camera.scale = 0.6; camera.x = 0; camera.y = 0;
        document.getElementById('menu').style.display = 'flex';
        document.getElementById('status').innerText = "🎨 繪製模式 (縮小視野)";
        draw();
    }

    function requestPermission() {
        if (path.length < 20) return alert("路徑太短了！");
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(res => { if (res === 'granted') startCalibration(); });
        } else { startCalibration(); }
    }

    function startCalibration() {
        const capture = (e) => {
            baseBeta = e.beta; baseGamma = e.gamma;
            window.removeEventListener('deviceorientation', capture);
            mode = 'PLAY'; camera.scale = 1.0; // 遊玩時回復 1:1
            document.getElementById('menu').style.display = 'none';
            document.getElementById('status').innerText = "⚖️ 挑戰中！";
            ball.x = path[0].x; ball.y = path[0].y;
            ball.vx = 0; ball.vy = 0;
            startTime = Date.now();
            window.addEventListener('deviceorientation', handleMotion);
            animate();
        };
        window.addEventListener('deviceorientation', capture);
    }

    function handleMotion(e) {
        if (mode !== 'PLAY') return;
        let db = e.beta - baseBeta, dg = e.gamma - baseGamma;
        if (Math.abs(dg) > physics.deadzone) ball.vx += dg * physics.sensitivity;
        if (Math.abs(db) > physics.deadzone) ball.vy += db * physics.sensitivity;
    }

    function animate() {
        if (mode !== 'PLAY') return;
        ball.vx *= physics.friction; ball.vy *= physics.friction;
        ball.x += Math.max(Math.min(ball.vx, physics.maxSpeed), -physics.maxSpeed);
        ball.y += Math.max(Math.min(ball.vy, physics.maxSpeed), -physics.maxSpeed);

        // 鏡頭追隨球
        camera.x = ball.x;
        camera.y = ball.y;

        // 碰撞檢測
        let onPath = false;
        for (let i = 0; i < path.length; i += 2) {
            if (Math.hypot(ball.x - path[i].x, ball.y - path[i].y) < physics.pathWidth) {
                onPath = true; break;
            }
        }

        if (!onPath) {
            if (confirm("球掉入深淵了！要重試嗎？")) {
                ball.x = path[0].x; ball.y = path[0].y; ball.vx = 0; ball.vy = 0;
            } else { clearPath(); return; }
        }

        if (Math.hypot(ball.x - path[path.length-1].x, ball.y - path[path.length-1].y) < 20) {
            alert("Goal!! 時間: " + ((Date.now() - startTime)/1000).toFixed(2) + "s");
            clearPath(); return;
        }

        draw();
        document.getElementById('timer').innerText = `時間：${((Date.now() - startTime)/1000).toFixed(2)}s`;
        requestAnimationFrame(animate);
    }

    function drawBall(x, y, type) {
        ctx.save();
        ctx.translate(x, y);
        
        // 球體基本陰影與形狀
        ctx.beginPath();
        ctx.arc(0, 0, ball.radius, 0, Math.PI*2);
        ctx.shadowBlur = 10; ctx.shadowColor = 'rgba(0,0,0,0.5)';
        
        if (type === 'soccer') {
            ctx.fillStyle = 'white'; ctx.fill();
            ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
            for(let i=0; i<5; i++) { // 簡易五邊形紋路
                ctx.rotate(Math.PI*2/5);
                ctx.strokeRect(-5, -5, 10, 10);
            }
        } else if (type === 'basketball') {
            ctx.fillStyle = '#e67e22'; ctx.fill();
            ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.arc(0, 0, ball.radius, 0.5, 2.5); ctx.stroke();
            ctx.beginPath(); ctx.arc(0, 0, ball.radius, 3.5, 5.5); ctx.stroke();
            ctx.moveTo(-ball.radius, 0); ctx.lineTo(ball.radius, 0); ctx.stroke();
        } else if (type === 'tennis') {
            ctx.fillStyle = '#ccff00'; ctx.fill();
            ctx.strokeStyle = 'white'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(ball.radius, 0, ball.radius, Math.PI*0.8, Math.PI*1.2); ctx.stroke();
            ctx.beginPath(); ctx.arc(-ball.radius, 0, ball.radius, -Math.PI*0.2, Math.PI*0.2); ctx.stroke();
        } else if (type === 'marble') {
            let grad = ctx.createRadialGradient(-5, -5, 2, 0, 0, ball.radius);
            grad.addColorStop(0, '#fff'); grad.addColorStop(0.4, '#3498db'); grad.addColorStop(1, '#2980b9');
            ctx.fillStyle = grad; ctx.globalAlpha = 0.7; ctx.fill();
        } else { // 9-ball
            ctx.fillStyle = 'white'; ctx.fill();
            ctx.fillStyle = '#f1c40f'; ctx.fillRect(-ball.radius, -8, ball.radius*2, 16);
            ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(0, 0, 7, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'black'; ctx.font = 'bold 10px arial'; ctx.textAlign='center'; ctx.fillText('9', 0, 4);
        }
        ctx.restore();
    }

    function draw() {
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 應用鏡頭轉換
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.scale(camera.scale, camera.scale);
        ctx.translate(-camera.x, -camera.y);

        if (path.length > 0) {
            // 路徑邊緣
            ctx.beginPath(); ctx.strokeStyle = "#222"; ctx.lineWidth = physics.pathWidth * 2 + 10;
            ctx.lineJoin = "round"; ctx.lineCap = "round";
            ctx.moveTo(path[0].x, path[0].y); path.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();
            // 路徑表面
            ctx.beginPath(); ctx.strokeStyle = "#444"; ctx.lineWidth = physics.pathWidth * 2;
            ctx.stroke();
            // 起點與終點
            ctx.fillStyle = "#28a745"; ctx.beginPath(); ctx.arc(path[0].x, path[0].y, 15, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#dc3545"; ctx.beginPath(); ctx.arc(path[path.length-1].x, path[path.length-1].y, 20, 0, Math.PI*2); ctx.fill();
        }

        const ballPos = (mode === 'PLAY') ? ball : (path.length > 0 ? path[path.length-1] : {x:0, y:0});
        drawBall(ballPos.x, ballPos.y, ballSelect.value);
    }
</script>
</body>
</html>
