<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LINE 平衡球大師挑戰</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --line-green: #06c755; --bg: #000000; }
        
        /* 核心防護：禁止選取、禁止呼叫選單、禁止縮放 */
        * { 
            -webkit-touch-callout: none; /* 禁用系統彈出選單 */
            -webkit-user-select: none;   /* 禁止選取文字 */
            user-select: none;
            -webkit-tap-highlight-color: transparent; /* 移除點擊高亮 */
        }

        body { 
            margin: 0; overflow: hidden; background: var(--bg); 
            font-family: -apple-system, sans-serif; 
            touch-action: none; /* 徹底接管所有手勢 */
        }
        
        canvas { display: block; }
        
        #ui-overlay { position: fixed; top: 40px; left: 20px; color: white; pointer-events: none; z-index: 10; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        #timer { font-size: 28px; font-family: monospace; font-weight: bold; }
        
        .controls { position: fixed; bottom: 40px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 12px; z-index: 100; }
        .btn-group { display: flex; gap: 10px; }
        button { padding: 14px 24px; font-size: 16px; border-radius: 30px; border: none; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn-main { background: var(--line-green); }
        .btn-alt { background: #444; }
        select { padding: 10px 15px; border-radius: 12px; background: white; border: 2px solid var(--line-green); font-size: 16px; }

        #share-panel { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 80%; background: #1a1a1a; border: 2px solid var(--line-green); 
            border-radius: 20px; padding: 25px; color: white; text-align: center; z-index: 1000;
        }
        .share-title { font-size: 22px; color: var(--line-green); margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div id="status">🎨 繪製賽道 (雙指視野)</div>
    <div id="timer">0.00s</div>
</div>

<div class="controls" id="menu">
    <select id="ballType">
        <option value="volleyball">🏐 排球 (輕快)</option>
        <option value="basketball">🏀 籃球 (擬真翻滾)</option>
        <option value="soccer">⚽ 足球 (黑白幾何)</option>
        <option value="nineball">🎱 九號球 (帶狀旋轉)</option>
    </select>
    <div class="btn-group">
        <button class="btn-alt" id="resetBtn">擦除重畫</button>
        <button class="btn-main" id="startBtn">確認開始</button>
    </div>
</div>

<div id="share-panel">
    <div class="share-title">🏆 抵達終點！</div>
    <p>完成時間：<span id="final-time" style="color: #f1c40f; font-size: 20px;">0.00</span>s</p>
    <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
        <button class="btn-main" onclick="sendChallenge()">💬 發送 LINE 戰帖</button>
        <button class="btn-alt" onclick="closeShare()">回首頁重畫</button>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    // 防止雙擊縮放
    document.addEventListener('touchstart', (e) => {
        if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const ballSelect = document.getElementById('ballType');
    
    let mode = 'DRAW'; 
    let path = [];
    let ball = { x: 0, y: 0, vx: 0, vy: 0, radius: 18, rotation: 0, dist: 0 };
    let camera = { x: 0, y: 0, scale: 0.6 };
    let baseBeta = 0, baseGamma = 0, startTime;
    const pathWidth = 38;

    // --- LIFF 初始化 ---
    async function initLiff() {
        try {
            // 請務必將此處替換為您的 LIFF ID
            await liff.init({ liffId: "YOUR_LIFF_ID" }); 
            
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.has('map')) {
                    decodePath(urlParams.get('map'));
                    document.getElementById('status').innerText = "🏁 挑戰賽道已載入";
                }
            }
        } catch (e) {
            console.error("LIFF 初始化失敗", e);
        }
    }

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        initLiff();
        draw();
    }
    window.addEventListener('resize', init);
    init();

    // 重新繪圖按鈕
    document.getElementById('resetBtn').onclick = clearPath;
    document.getElementById('startBtn').onclick = requestPermission;

    function getMessagePos(e) {
        return {
            x: (e.clientX - canvas.width/2) / camera.scale + camera.x,
            y: (e.clientY - canvas.height/2) / camera.scale + camera.y
        };
    }

    canvas.addEventListener('pointermove', (e) => {
        if (mode === 'DRAW' && e.buttons === 1) {
            path.push(getMessagePos(e));
            draw();
        }
    });

    function clearPath() {
        path = []; mode = 'DRAW'; camera.scale = 0.6; camera.x = 0; camera.y = 0;
        document.getElementById('menu').style.display = 'flex';
        document.getElementById('share-panel').style.display = 'none';
        document.getElementById('status').innerText = "🎨 繪製賽道 (雙指視野)";
        draw();
    }

    function requestPermission() {
        if (path.length < 15) return alert("請先畫出一條連通起點(綠)到終點(紅)的線");
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(res => { if (res === 'granted') startCalibration(); });
        } else { startCalibration(); }
    }

    function startCalibration() {
        const capture = (e) => {
            baseBeta = e.beta; baseGamma = e.gamma;
            window.removeEventListener('deviceorientation', capture);
            mode = 'PLAY'; camera.scale = 1.0;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('status').innerText = "🚀 衝刺！";
            ball.x = path[0].x; ball.y = path[0].y;
            ball.vx = 0; ball.vy = 0; ball.dist = 0;
            startTime = Date.now();
            window.addEventListener('deviceorientation', handleMotion);
            animate();
        };
        window.addEventListener('deviceorientation', capture);
    }

    function handleMotion(e) {
        if (mode !== 'PLAY') return;
        ball.vx += (e.gamma - baseGamma) * 0.022;
        ball.vy += (e.beta - baseBeta) * 0.022;
    }

    function animate() {
        if (mode !== 'PLAY') return;
        ball.vx *= 0.96; ball.vy *= 0.96;
        ball.x += ball.vx; ball.y += ball.vy;
        if (Math.hypot(ball.vx, ball.vy) > 0.1) {
            ball.rotation = Math.atan2(ball.vy, ball.vx);
            ball.dist += Math.hypot(ball.vx, ball.vy);
        }
        camera.x = ball.x; camera.y = ball.y;

        let onPath = false;
        for (let i = 0; i < path.length; i += 3) {
            if (Math.hypot(ball.x - path[i].x, ball.y - path[i].y) < pathWidth) { onPath = true; break; }
        }
        if (!onPath) { ball.x = path[0].x; ball.y = path[0].y; ball.vx = 0; ball.vy = 0; }

        const endPoint = path[path.length - 1];
        if (Math.hypot(ball.x - endPoint.x, ball.y - endPoint.y) < 25) {
            handleWin();
            return;
        }

        draw();
        document.getElementById('timer').innerText = ((Date.now() - startTime)/1000).toFixed(2) + "s";
        requestAnimationFrame(animate);
    }

    function handleWin() {
        mode = 'GOAL';
        const finalTime = ((Date.now() - startTime)/1000).toFixed(2);
        document.getElementById('final-time').innerText = finalTime;
        document.getElementById('share-panel').style.display = 'block';
    }

    function closeShare() {
        document.getElementById('share-panel').style.display = 'none';
        clearPath();
    }

    // --- 關鍵：修正後的分享邏輯 ---
    async function sendChallenge() {
        const mapData = encodePath();
        const time = document.getElementById('final-time').innerText;
        const shareLink = `${window.location.origin}${window.location.pathname}?map=${mapData}&time=${time}`;

        if (!liff.isLoggedIn()) {
            alert("請先登入 LINE");
            liff.login();
            return;
        }

        if (liff.isApiAvailable('shareTargetPicker')) {
            try {
                const result = await liff.shareTargetPicker([{
                    "type": "flex",
                    "altText": "有人挑戰你玩平衡球！",
                    "contents": {
                        "type": "bubble",
                        "body": {
                            "type": "box", "layout": "vertical",
                            "contents": [
                                {"type": "text", "text": "⚖️ 平衡球戰帖", "weight": "bold", "color": "#06c755", "size": "xl"},
                                {"type": "text", "text": `紀錄：${time}s`, "margin": "md", "size": "lg"},
                                {"type": "text", "text": "點擊下方按鈕接受挑戰，看誰滾得快！", "wrap": true, "size": "xs", "color": "#999999", "margin": "sm"}
                            ]
                        },
                        "footer": {
                            "type": "box", "layout": "vertical",
                            "contents": [
                                {"type": "button", "action": {"type": "uri", "label": "接受挑戰", "uri": shareLink}, "style": "primary", "color": "#06c755"}
                            ]
                        }
                    }
                }]);
                if (result) {
                    alert("戰帖已發出！");
                    closeShare();
                }
            } catch (err) {
                alert("分享取消或失敗，請檢查 LIFF ShareTargetPicker 權限是否開啟。");
            }
        } else {
            alert("目前環境不支援分享功能，請在 LINE App 中開啟。");
        }
    }

    function encodePath() {
        const sampled = path.filter((_, i) => i % 5 === 0);
        return btoa(JSON.stringify(sampled.map(p => [Math.round(p.x), Math.round(p.y)])));
    }

    function decodePath(str) {
        try {
            const data = JSON.parse(atob(str));
            path = data.map(p => ({ x: p[0], y: p[1] }));
        } catch(e) { console.error("解碼賽道失敗"); }
    }

    function drawBall(x, y, type) {
        ctx.save();
        ctx.translate(x, y);
        ctx.beginPath(); ctx.arc(0, 0, ball.radius, 0, Math.PI*2); ctx.clip();
        ctx.rotate(ball.rotation);
        const d = ball.dist; const r = ball.radius;

        if (type === 'volleyball') {
            ctx.fillStyle = '#fff'; ctx.fill();
            ctx.strokeStyle = '#2980b9'; ctx.lineWidth = 1.5;
            for(let i=-2; i<=2; i++){
                let s = (d + i*25)%100-50;
                ctx.beginPath(); ctx.moveTo(-20, s); ctx.bezierCurveTo(0, s+15, 0, s-15, 20, s); ctx.stroke();
            }
        } else if (type === 'basketball') {
            ctx.fillStyle = '#e67e22'; ctx.fill();
            ctx.strokeStyle = '#222'; ctx.lineWidth = 1.8;
            for(let i = -3; i <= 3; i++) {
                let shift = (d + i * r * 3) % (r * 6) - (r * 3);
                ctx.beginPath(); ctx.arc(shift, 0, r * 1.2, 0, Math.PI * 2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(shift, -r); ctx.lineTo(shift, r); ctx.stroke();
            }
        } else if (type === 'soccer') {
            ctx.fillStyle = '#fff'; ctx.fill(); ctx.fillStyle = '#000';
            const s = 18;
            for(let i = -5; i <= 5; i++) {
                for(let j = -3; j <= 3; j++) {
                    let sx = (d + i * s) % (s * 4) - (s * 2);
                    if((i+j)%2 === 0) ctx.fillRect(sx, j*s - s/2, s, s);
                }
            }
        } else { // nineball
            ctx.fillStyle = '#fff'; ctx.fill(); ctx.fillStyle = '#f1c40f';
            for(let i = -2; i <= 2; i++) {
                let sx = (d + i * r * 4) % (r * 8) - (r * 4);
                ctx.fillRect(sx - 10, -r, 20, r*2);
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(sx, 0, 8, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#000'; ctx.font = 'bold 10px Arial'; ctx.textAlign='center'; ctx.fillText('9', sx, 4);
                ctx.fillStyle = '#f1c40f';
            }
        }
        ctx.restore();
        
        ctx.save(); ctx.translate(x, y);
        let grad = ctx.createRadialGradient(-r/2, -r/2, 2, 0, 0, r);
        grad.addColorStop(0, "rgba(255,255,255,0.4)"); grad.addColorStop(0.6, "rgba(0,0,0,0)"); grad.addColorStop(1, "rgba(0,0,0,0.5)");
        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }

    function draw() {
        ctx.setTransform(1,0,0,1,0,0);
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.scale(camera.scale, camera.scale);
        ctx.translate(-camera.x, -camera.y);

        if (path.length > 0) {
            ctx.strokeStyle = "#111"; ctx.lineWidth = 86; ctx.lineJoin="round"; ctx.lineCap="round";
            ctx.beginPath(); ctx.moveTo(path[0].x, path[0].y); path.forEach(p=>ctx.lineTo(p.x, p.y)); ctx.stroke();
            ctx.strokeStyle = "#444"; ctx.lineWidth = 76;
            ctx.beginPath(); ctx.moveTo(path[0].x, path[0].y); path.forEach(p=>ctx.lineTo(p.x, p.y)); ctx.stroke();
            ctx.fillStyle="#28a745"; ctx.beginPath(); ctx.arc(path[0].x, path[0].y, 15, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle="#dc3545"; ctx.beginPath(); ctx.arc(path[path.length-1].x, path[path.length-1].y, 25, 0, Math.PI*2); ctx.fill();
        }

        const isDrawing = mode === 'DRAW' && path.length > 0;
        const p = mode === 'PLAY' ? ball : (isDrawing ? path[path.length-1] : {x:0, y:0});
        if(mode === 'PLAY' || isDrawing) drawBall(p.x, p.y, ballSelect.value);
    }
</script>
</body>
</html>
